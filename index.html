<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDC / Collection Form</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#f5f7fa;
}
.card {
  border-radius:15px;
}
.hidden {
  display:none;
}
</style>

</head>
<body>

<div class="container mt-4">
  <div class="card p-4 shadow">

    <h4 class="mb-3 text-center">Collection / TDC Entry</h4>

    <!-- IVRS -->
    <div class="mb-3">
      <label>Enter IVRS</label>
      <div class="input-group">
        <input type="text" id="ivrs" class="form-control">
        <button class="btn btn-primary" onclick="fetchData()">Fetch</button>
      </div>
    </div>

    <!-- Consumer Details -->
    <div id="consumerBox" class="hidden">

      <hr>

      <p><b>Name:</b> <span id="name"></span></p>
      <p><b>Address:</b> <span id="address"></span></p>
      <p><b>Mobile:</b> <span id="mobile"></span></p>
      <p><b>Outstanding:</b> ₹ <span id="due"></span></p>

      <hr>

      <!-- Type -->
      <div class="mb-3">
        <label>Select Type</label><br>
        <input type="radio" name="type" value="paid" onclick="selectType()"> Paid
        <input type="radio" name="type" value="tdc" onclick="selectType()"> TDC
      </div>

      <!-- Amount -->
      <div class="mb-3 hidden" id="amountBox">
        <label>Enter Amount</label>
        <input type="number" id="amount" class="form-control">
      </div>

      <!-- Image -->
      <div class="mb-3 hidden" id="imageBox">
        <label>Upload GPS Photo</label>
        <input type="file" id="image" class="form-control" accept="image/*" capture="environment">
      </div>

      <!-- Submit -->
      <button class="btn btn-success w-100" onclick="submitData()">Submit</button>

    </div>

  </div>
</div>

<script>

// 🔥 YOUR APPS SCRIPT URL
const API_URL = "https://script.google.com/macros/s/AKfycbxbtOGxA9TvAzj53eUcxAhKSvl_RVLfFjHNBZC-VvKhx4FzKMZW84HGP6QI1VDSW6Py1w/exec";

let consumer = {};

// ================= FETCH DATA =================
function fetchData() {

  let ivrs = document.getElementById("ivrs").value;

  fetch(API_URL + "?ivrs=" + ivrs)
  .then(res => res.json())
  .then(data => {

    if (data.status !== "success") {
      alert("Consumer not found");
      return;
    }

    consumer = data;

    document.getElementById("consumerBox").classList.remove("hidden");

    document.getElementById("name").innerText = data.name;
    document.getElementById("address").innerText = data.address;
    document.getElementById("mobile").innerText = data.mobile;
    document.getElementById("due").innerText = data.due;

  });

}


// ================= TYPE SELECT =================
function selectType() {

  let type = document.querySelector('input[name="type"]:checked').value;

  if (type === "paid") {
    document.getElementById("amountBox").classList.remove("hidden");
    document.getElementById("imageBox").classList.add("hidden");
  }

  if (type === "tdc") {
    document.getElementById("amountBox").classList.add("hidden");
    document.getElementById("imageBox").classList.remove("hidden");

    // auto fill amount
    document.getElementById("amount").value = consumer.due;
  }
}


// ================= SUBMIT =================
function submitData() {

  let ivrs = document.getElementById("ivrs").value;
  let type = document.querySelector('input[name="type"]:checked').value;
  let amount = document.getElementById("amount").value;

  if (!type) {
    alert("Select type");
    return;
  }

  if (type === "paid" && !amount) {
    alert("Enter amount");
    return;
  }

  let file = document.getElementById("image").files[0];

  let reader = new FileReader();

  reader.onload = function() {

    let base64 = reader.result.split(",")[1];

    let today = new Date();
    let dd = String(today.getDate()).padStart(2, '0');
    let mm = String(today.getMonth()+1).padStart(2, '0');
    let yyyy = today.getFullYear();

    let filename = ivrs + dd + mm + yyyy + ".jpg";

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        ivrs: ivrs,
        name: consumer.name,
        type: type,
        amount: amount,
        image: base64,
        filename: filename
      })
    })
    .then(res => res.json())
    .then(data => {
      alert("Saved Successfully");
      location.reload();
    });

  };

  if (type === "tdc") {
    if (!file) {
      alert("Upload photo");
      return;
    }
    reader.readAsDataURL(file);
  } else {
    // paid without image
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        ivrs: ivrs,
        name: consumer.name,
        type: type,
        amount: amount
      })
    })
    .then(res => res.json())
    .then(data => {
      alert("Saved Successfully");
      location.reload();
    });
  }

}

</script>

</body>
</html>
